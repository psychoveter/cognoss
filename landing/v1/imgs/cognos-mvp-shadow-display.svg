<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#171b23" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L13,7 L1,13 Z" fill="#171b23"/>
    </marker>
    <marker id="arrowGold" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L13,7 L1,13 Z" fill="#c78a24"/>
    </marker>
    <style>
      .bg { fill: #f6f0eb; }
      .paper { fill: #fffaf1; stroke: #171b23; stroke-width: 2.8; }
      .paperSoft { fill: #ffffff; stroke: rgba(23, 27, 35, 0.16); stroke-width: 2; }
      .dark { fill: #111111; }
      .line { stroke: #171b23; stroke-width: 3.3; fill: none; marker-end: url(#arrow); }
      .lineGold { stroke: #c78a24; stroke-width: 3.2; fill: none; marker-end: url(#arrowGold); }
      .lineNoArrow { stroke: #171b23; stroke-width: 3.3; fill: none; }
      .dash { stroke-dasharray: 8 10; opacity: 0.45; }
      .boundary { stroke: #171b23; stroke-width: 2; stroke-dasharray: 3 10; stroke-linecap: round; opacity: 0.75; }
      .title { font: 700 48px Cambria, Georgia, serif; fill: #171b23; letter-spacing: -1px; }
      .subtitle { font: 600 20px Calibri, Arial, sans-serif; fill: #596171; }
      .labelSmall { font: 700 14px "Courier New", monospace; fill: #777; letter-spacing: 1.6px; text-transform: uppercase; }
      .boxText { font: 700 32px Cambria, Georgia, serif; fill: #171b23; }
      .boxTextSmall { font: 700 23px Cambria, Georgia, serif; fill: #171b23; }
      .muted { font: 600 18px Calibri, Arial, sans-serif; fill: #596171; }
      .tiny { font: 700 13px "Courier New", monospace; fill: #777; letter-spacing: 1px; text-transform: uppercase; }
      .chipText { font: 800 16px "Courier New", monospace; fill: #fffaf1; }
      .chipTextDark { font: 800 16px "Courier New", monospace; fill: #171b23; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="960"/>

  <text class="labelSmall" x="70" y="60">CognOSS MVP Phase</text>
  <text class="title" x="70" y="112">Shadow display above Linux</text>
  <text class="subtitle" x="72" y="148">Fork Wayland as a safe display mirror: observe, annotate and suggest before acting.</text>

  <!-- Main stack -->
  <g filter="url(#shadow)">
    <rect class="paper" x="185" y="195" width="1070" height="88" rx="18"/>
  </g>
  <text class="boxText" x="520" y="252">Personal Generative UI</text>

  <g filter="url(#shadow)">
    <rect class="paper" x="185" y="365" width="1070" height="102" rx="20"/>
  </g>
  <text class="boxText" x="455" y="427">CognOSS MVP &amp; User Life Model</text>
  <text class="labelSmall" x="1012" y="427">PRIVATE MEMORY</text>

  <g filter="url(#shadow)">
    <rect class="paper" x="185" y="545" width="1070" height="88" rx="18"/>
  </g>
  <text class="boxText" x="560" y="602">Shadow Display</text>
  <text class="labelSmall" x="984" y="602">WAYLAND FORK</text>

  <g filter="url(#shadow)">
    <rect class="paper" x="185" y="740" width="1070" height="78" rx="16"/>
  </g>
  <text class="boxTextSmall" x="677" y="789">Linux</text>
  <text class="labelSmall" x="1036" y="789">HOST OS</text>

  <!-- Flow arrows -->
  <path class="line" d="M590 285 L590 360"/>
  <path class="line" d="M855 360 L855 286"/>
  <path class="line" d="M585 468 L585 540"/>
  <path class="line" d="M855 540 L855 470"/>
  <path class="line" d="M720 735 L720 637"/>

  <!-- Boundary -->
  <line class="boundary" x1="150" y1="515" x2="1290" y2="515"/>
  <rect class="bg" x="548" y="493" width="345" height="42"/>
  <text class="tiny" x="585" y="520">COGNOSS CONTROL BOUNDARY</text>

  <!-- MVP notes left -->
  <g filter="url(#shadow)">
    <rect class="paperSoft" x="72" y="360" width="84" height="280" rx="16"/>
  </g>
  <text class="labelSmall" transform="translate(112 600) rotate(-90)">MVP EXOMIND</text>

  <!-- Wayland note right -->
  <g filter="url(#shadow)">
    <rect class="paperSoft" x="1284" y="520" width="84" height="320" rx="16"/>
  </g>
  <text class="labelSmall" transform="translate(1326 794) rotate(-90)">FORKED WAYLAND</text>

  <!-- External apps represented below shadow display -->
  <g>
    <text class="labelSmall" x="250" y="865">EXTERNAL APPS</text>
    <circle cx="455" cy="868" r="28" fill="#18a7a0"/>
    <text class="chipText" x="443" y="875">TG</text>
    <rect x="520" y="844" width="58" height="48" rx="10" fill="#d64b3f"/>
    <text class="chipText" x="539" y="875">M</text>
    <circle cx="650" cy="868" r="28" fill="#111111"/>
    <text class="chipText" x="632" y="875">GH</text>
    <rect x="724" y="842" width="62" height="52" rx="10" fill="#1b74d2"/>
    <text class="chipText" x="746" y="875">D</text>
    <rect x="838" y="846" width="76" height="44" rx="9" fill="#fffaf1" stroke="#171b23" stroke-width="2"/>
    <text class="chipTextDark" x="858" y="875">WEB</text>
    <rect x="970" y="844" width="62" height="50" rx="10" fill="#111111"/>
    <text class="chipText" x="986" y="876">IDE</text>
  </g>

  <!-- traces from linux/apps to wayland -->
  <path class="lineNoArrow dash" d="M455 842 C455 760 475 705 520 635"/>
  <path class="lineNoArrow dash" d="M650 840 C666 765 690 710 720 637"/>
  <path class="lineNoArrow dash" d="M1000 840 C970 760 930 710 870 635"/>

</svg>
